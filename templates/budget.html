{% extends "base.html" %}

{% block title %}
Budget Management
{% endblock %}

{% block page_title %}
Set Budget
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-7">

        <div class="card">

            <div class="card-body p-4">

                <h3 class="mb-4">
                    Budget Management
                </h3>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Category
                        </label>

                        <select
                            name="category"
                            class="form-select">

                            <option>Food</option>
                            <option>Travel</option>
                            <option>Shopping</option>
                            <option>Education</option>
                            <option>Bills</option>
                            <option>Entertainment</option>
                            <option>Healthcare</option>

                        </select>

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Budget Limit (₹)
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="budget_limit"
                            class="form-control"
                            placeholder="Enter Budget Amount"
                            required>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Save Budget

                        </button>

                        <a href="{{ url_for('budget_summary') }}"
                           class="btn btn-secondary">

                            View Summary

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
