{% extends "base.html" %}

{% block title %}
Add Transaction
{% endblock %}

{% block page_title %}
Add Transaction
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-8">

        <div class="card">

            <div class="card-body p-4">

                <h3 class="mb-4">
                    Add New Transaction
                </h3>

                <form method="POST">

                    <div class="mb-3">

                        <label class="form-label">
                            Amount
                        </label>

                        <input
                            type="number"
                            step="0.01"
                            name="amount"
                            class="form-control"
                            placeholder="Enter Amount"
                            required>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Transaction Type
                        </label>

                        <select
                            name="type"
                            class="form-select">

                            <option value="income">
                                Income
                            </option>

                            <option value="expense">
                                Expense
                            </option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Category
                        </label>

                        <select
                            name="category"
                            class="form-select">

                            <option>Salary</option>
                            <option>Food</option>
                            <option>Travel</option>
                            <option>Shopping</option>
                            <option>Education</option>
                            <option>Bills</option>
                            <option>Entertainment</option>
                            <option>Healthcare</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="form-label">
                            Description
                        </label>

                        <input
                            type="text"
                            name="description"
                            class="form-control"
                            placeholder="Transaction Description">

                    </div>

                    <div class="mb-4">

                        <label class="form-label">
                            Date
                        </label>

                        <input
                            type="date"
                            name="date"
                            class="form-control"
                            required>

                    </div>

                    <div class="d-flex gap-2">

                        <button
                            type="submit"
                            class="btn btn-primary">

                            Save Transaction

                        </button>

                        <a href="{{ url_for('view_transactions') }}"
                           class="btn btn-secondary">

                            Cancel

                        </a>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
